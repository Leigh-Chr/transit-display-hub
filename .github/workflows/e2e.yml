name: E2E (Playwright)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/e2e.yml'

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  e2e:
    name: Backend up + Playwright run
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Make Gradle wrapper executable
        working-directory: backend
        run: chmod +x ./gradlew

      - name: Boot Spring (dev profile / H2 in-memory) in background
        working-directory: backend
        env:
          # Generated per run — the dev profile now requires JWT_SECRET
          # like prod/kiosk (audit 2026-05-12, no committed fallback).
          JWT_SECRET: ci-jwt-secret-${{ github.run_id }}-padded-to-be-at-least-thirty-two-bytes
        run: |
          nohup ./gradlew bootRun --args='--spring.profiles.active=dev' > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Resolve Playwright version
        id: playwright-version
        working-directory: frontend
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        working-directory: frontend
        # All three projects defined in playwright.config.ts so CI matches
        # the local matrix (chromium / firefox / mobile-chrome).
        # When the browser bundle is restored from cache, only refresh the
        # apt dependencies — the binaries themselves stay put.
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium firefox
          else
            npx playwright install --with-deps chromium firefox
          fi

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null; then
              echo "Backend is up after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "Backend never came up; tail of log:"
          tail -200 backend/backend.log
          exit 1

      - name: Run Playwright
        working-directory: frontend
        run: npm run e2e

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend/backend.pid ]; then
            kill "$(cat backend/backend.pid)" || true
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: backend-log
          path: backend/backend.log
          retention-days: 7
