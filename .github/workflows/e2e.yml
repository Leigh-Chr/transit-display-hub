name: E2E (Playwright)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/e2e.yml'

jobs:
  e2e:
    name: Backend up + Playwright run
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Make Gradle wrapper executable
        working-directory: backend
        run: chmod +x ./gradlew

      - name: Boot Spring (dev profile / H2 in-memory) in background
        working-directory: backend
        run: |
          nohup ./gradlew bootRun --args='--spring.profiles.active=dev' > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null; then
              echo "Backend is up after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "Backend never came up; tail of log:"
          tail -200 backend/backend.log
          exit 1

      - name: Run Playwright
        working-directory: frontend
        run: npm run e2e

      - name: Stop backend
        if: always()
        run: |
          if [ -f backend/backend.pid ]; then
            kill "$(cat backend/backend.pid)" || true
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: backend-log
          path: backend/backend.log
          retention-days: 7
