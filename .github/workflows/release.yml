name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      # Required for actions/attest-build-provenance to sign attestations
      # via the Sigstore transparency log.
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: changelog
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${REF_NAME}"
          # Strip leading 'v' to get the version
          VERSION="${TAG#v}"
          # Extract the section between "## [VERSION]" and the next "## ["
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "WARNING: no notes found for $VERSION in CHANGELOG.md"
            echo "Release ${TAG}" > release-notes.md
          fi
          echo "--- Release notes ---"
          cat release-notes.md

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        id: build-backend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/leigh-chr/transit-display-hub-backend:${{ github.ref_name }}
            ghcr.io/leigh-chr/transit-display-hub-backend:latest

      - name: Attest backend image provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ghcr.io/leigh-chr/transit-display-hub-backend
          subject-digest: ${{ steps.build-backend.outputs.digest }}
          push-to-registry: true

      - name: Build & push frontend image
        id: build-frontend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/leigh-chr/transit-display-hub-frontend:${{ github.ref_name }}
            ghcr.io/leigh-chr/transit-display-hub-frontend:latest

      - name: Attest frontend image provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ghcr.io/leigh-chr/transit-display-hub-frontend
          subject-digest: ${{ steps.build-frontend.outputs.digest }}
          push-to-registry: true

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build backend bootJar
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew bootJar --no-daemon -q

      - name: Upload bootJar artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: backend-jar
          path: backend/build/libs/transit-display-hub-*.jar
          retention-days: 90

      - name: Generate SBOM for backend bootJar (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: backend/build/libs
          format: cyclonedx-json
          artifact-name: transit-display-hub-backend.cdx.json
          output-file: backend-sbom.cdx.json

      - name: Attest bootJar provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: backend/build/libs/transit-display-hub-*.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: release-notes.md
          files: |
            backend/build/libs/transit-display-hub-*.jar
            backend-sbom.cdx.json
          generate_release_notes: false
          fail_on_unmatched_files: true
