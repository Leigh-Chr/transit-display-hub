name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      # Required for actions/attest-build-provenance to sign attestations
      # via the Sigstore transparency log.
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip leading 'v' to get the version
          VERSION="${TAG#v}"
          # Extract the section between "## [VERSION]" and the next "## ["
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "WARNING: no notes found for $VERSION in CHANGELOG.md"
            echo "Release ${TAG}" > release-notes.md
          fi
          echo "--- Release notes ---"
          cat release-notes.md

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        id: build-backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/leigh-chr/transit-display-hub-backend:${{ github.ref_name }}
            ghcr.io/leigh-chr/transit-display-hub-backend:latest

      - name: Attest backend image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/leigh-chr/transit-display-hub-backend
          subject-digest: ${{ steps.build-backend.outputs.digest }}
          push-to-registry: true

      - name: Build & push frontend image
        id: build-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/leigh-chr/transit-display-hub-frontend:${{ github.ref_name }}
            ghcr.io/leigh-chr/transit-display-hub-frontend:latest

      - name: Attest frontend image provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/leigh-chr/transit-display-hub-frontend
          subject-digest: ${{ steps.build-frontend.outputs.digest }}
          push-to-registry: true

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Build backend bootJar
        working-directory: backend
        run: |
          chmod +x ./gradlew
          ./gradlew bootJar --no-daemon -q

      - name: Upload bootJar artifact
        uses: actions/upload-artifact@v5
        with:
          name: backend-jar
          path: backend/build/libs/transit-display-hub-*.jar
          retention-days: 90

      - name: Generate SBOM for backend bootJar (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          path: backend/build/libs
          format: cyclonedx-json
          artifact-name: transit-display-hub-backend.cdx.json
          output-file: backend-sbom.cdx.json

      - name: Attest bootJar provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: backend/build/libs/transit-display-hub-*.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            backend/build/libs/transit-display-hub-*.jar
            backend-sbom.cdx.json
          generate_release_notes: false
          fail_on_unmatched_files: true
