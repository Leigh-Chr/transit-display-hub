name: No tracked .env

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: no-env-tracked-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify .env is not tracked
        run: |
          if git ls-files .env | grep -q .; then
            echo "::error::A .env file is tracked. Move secrets to .env.example with placeholders."
            exit 1
          fi
