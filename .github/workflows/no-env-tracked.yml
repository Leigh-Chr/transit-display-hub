name: No tracked .env

on:
  pull_request:
  push:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify .env is not tracked
        run: |
          if git ls-files .env | grep -q .; then
            echo "::error::A .env file is tracked. Move secrets to .env.example with placeholders."
            exit 1
          fi
