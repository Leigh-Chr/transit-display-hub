<ng-container *transloco="let t">
  <header class="page-header">
    <h1 class="page-title">{{ t('admin.operations.title') }}</h1>
    <p class="page-subtitle">{{ t('admin.operations.subtitle') }}</p>
  </header>
  <nav
    mat-tab-nav-bar
    [tabPanel]="tabPanel"
    class="operations-tabs"
    [attr.aria-label]="t('admin.navigation.operations')"
  >
    <a
      mat-tab-link
      routerLink="realtime"
      routerLinkActive
      #rtActive="routerLinkActive"
      [active]="rtActive.isActive"
    >
      <mat-icon class="tab-icon" aria-hidden="true">sensors</mat-icon>
      {{ t('admin.navigation.realtime') }}
    </a>
    <a
      mat-tab-link
      routerLink="import-history"
      routerLinkActive
      #ihActive="routerLinkActive"
      [active]="ihActive.isActive"
    >
      <mat-icon class="tab-icon" aria-hidden="true">history</mat-icon>
      {{ t('admin.navigation.importAudit') }}
    </a>
  </nav>
  <mat-tab-nav-panel #tabPanel>
    <router-outlet></router-outlet>
  </mat-tab-nav-panel>
</ng-container>
