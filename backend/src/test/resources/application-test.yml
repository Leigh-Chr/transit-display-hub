spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-key-for-jwt-token-generation-must-be-at-least-256-bits-long
    expiration-hours: 24
  data-loader:
    source: ""
  security:
    # Drop BCrypt cost from the prod default (12 → 4 = ~250 ms vs ~3 ms
    # per encode). Hundreds of @BeforeEach user seeds otherwise spend
    # ~10 s of every backend run on hashing. Strength 4 is the BCrypt
    # minimum and is fine for tests that never authenticate against an
    # external attacker.
    bcrypt-strength: 4
