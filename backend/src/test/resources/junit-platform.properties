# JUnit 5 parallelism — classes run on their own worker thread so pure
# unit tests (Mockito, plain JUnit) can fan out across CPUs. Methods
# inside a class stay sequential (mode.default=same_thread) because a
# typical Mockito @BeforeEach mutates per-instance state that two
# methods would otherwise race on.
#
# @SpringBootTest classes are explicitly annotated with
# @Execution(ExecutionMode.SAME_THREAD) so two of them never share the
# H2 in-memory database or the cached application context at the same
# moment. Pure unit tests need no extra annotation — the default
# class-level concurrency picks them up automatically.
junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=concurrent
junit.jupiter.execution.parallel.config.strategy=dynamic
# 1.5 × CPU is the JUnit reference default for the dynamic strategy;
# stays balanced between CPU-bound unit tests and the I/O-bound Mockito
# stubs that dominate the suite.
junit.jupiter.execution.parallel.config.dynamic.factor=1.5
