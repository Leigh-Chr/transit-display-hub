spring:
  application:
    name: transit-display-hub
  profiles:
    active: dev

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:transitdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false

app:
  data-loader:
    source: gtfs    # synthetic | gtfs | (omitted to disable)
    gtfs:
      url: https://data.mobilites-m.fr/api/gtfs/SEM
      network-name: M Réso (Grenoble)
      attribution: "SMMAG / M Réso — ODbL"
  jwt:
    secret: dev-secret-key-for-jwt-token-generation-must-be-at-least-256-bits-long
    expiration-hours: 8

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/transit}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USER:transit}
    password: ${DATABASE_PASSWORD:transit}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    locations: classpath:db/migration

app:
  data-loader:
    source: ${DATA_LOADER_SOURCE:}    # leave empty in prod by default
  jwt:
    secret: ${JWT_SECRET}
    expiration-hours: 8
