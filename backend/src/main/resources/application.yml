spring:
  application:
    name: transit-display-hub
  profiles:
    active: dev
  jackson:
    time-zone: ${APP_TIMEZONE:Europe/Paris}
  jpa:
    # Disable Open-Session-In-View. Every controller path either reads
    # eagerly (JOIN FETCH on the repo query) or is wrapped by a service
    # method that holds its own @Transactional(readOnly=true) — keeping
    # the session open for the view layer would mask a missing fetch
    # by quietly issuing N+1 lazy loads at JSON-serialization time.
    open-in-view: false

server:
  port: 8080

app:
  # Operator-facing local time used for schedule comparisons. Override via
  # APP_TIMEZONE on networks running outside Europe/Paris.
  timezone: ${APP_TIMEZONE:Europe/Paris}
  auth:
    # HttpOnly cookies dropped at /api/auth/login. Secure defaults to true
    # so a misconfigured deployment fails closed (browser refuses to send
    # the cookie over HTTP) instead of fail-open with a tappable session.
    # The dev profile flips it back to false because Spring's H2 test rig
    # serves over http://localhost. SameSite stays Strict so a cross-site
    # form post cannot piggyback on an existing session.
    access-cookie-name: ${AUTH_ACCESS_COOKIE_NAME:ACCESS_TOKEN}
    refresh-cookie-name: ${AUTH_REFRESH_COOKIE_NAME:REFRESH_TOKEN}
    cookie-secure: ${AUTH_COOKIE_SECURE:true}
    cookie-same-site: ${AUTH_COOKIE_SAME_SITE:Strict}
    cookie-domain: ${AUTH_COOKIE_DOMAIN:}

management:
  endpoints:
    web:
      exposure:
        # /actuator/prometheus exposes the scrape format wired by the
        # micrometer-registry-prometheus dependency. Health and info
        # stay public for compatibility with existing load-balancer
        # probes; everything else stays gated behind the security rules
        # in {@code SecurityConfig}.
        include: health,info,prometheus,metrics
  metrics:
    tags:
      # Stable application tag every metric inherits — keeps Grafana
      # dashboards portable across environments without per-deployment
      # rewriting of the queries.
      application: transit-display-hub
    distribution:
      percentiles-histogram:
        # Distribution buckets for HTTP server timings — Spring Boot
        # records http.server.requests via Micrometer's WebMvc
        # auto-config; flipping the histogram on lets Grafana compute
        # quantiles server-side instead of approximating from counts.
        http.server.requests: true
        gtfs.import.duration: true

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:transitdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
  flyway:
    enabled: false

app:
  auth:
    # `ng serve` proxies to http://localhost:8080; Secure cookies would
    # never reach the browser. Override here keeps the dev loop friction-
    # free without weakening the prod default.
    cookie-secure: ${AUTH_COOKIE_SECURE:false}
  data-loader:
    source: ${DATA_LOADER_SOURCE:gtfs}    # gtfs | (omitted to disable)
    # GTFS feeds tested for layout-engine generality. Override with
    # DATA_LOADER_GTFS_URL / DATA_LOADER_GTFS_NETWORK_NAME env vars.
    #   Grenoble (M Réso)    https://data.mobilites-m.fr/api/gtfs/SEM
    #   Strasbourg (CTS)     https://opendata.cts-strasbourg.eu/google_transit.zip
    #   Bordeaux (TBM)       https://bdx.mecatran.com/utw/ws/gtfsfeed/static/bordeaux?apiKey=opendata-bordeaux-metropole-flux-gtfs-rt
    #   Nantes (Naolib)      https://data.nantesmetropole.fr/explore/dataset/244400404_tan-arrets-horaires-circuits/files/16a1a0af5946619af621baa4ad9ee662/download/
    #   Tours (Fil Bleu)     https://data.tours-metropole.fr/api/v2/catalog/datasets/horaires-temps-reel-gtfsrt-reseau-filbleu-tmvl/alternative_exports/filbleu_gtfs_zip
    #
    # In-classpath fixture (no network required, exercises every spec
    # surface — pathways, fares V1+V2, translations, TAD, transfer
    # qualifiers, attributions, …):
    #   DATA_LOADER_GTFS_URL=classpath:fixtures/gtfs-rich/
    #   DATA_LOADER_GTFS_NETWORK_NAME=Rich Demo
    gtfs:
      url: ${DATA_LOADER_GTFS_URL:https://data.mobilites-m.fr/api/gtfs/SEM}
      network-name: ${DATA_LOADER_GTFS_NETWORK_NAME:M Réso (Grenoble)}
      attribution: ${DATA_LOADER_GTFS_ATTRIBUTION:SMMAG / M Réso — ODbL}
  jwt:
    # No fallback even in dev: every profile must supply JWT_SECRET via the
    # environment (see .env.example). Shipping a literal here means anyone
    # who clones the repo can forge tokens against any forgotten override.
    secret: ${JWT_SECRET}
    expiration-hours: 8
    issuer: ${JWT_ISSUER:transit-display-hub}
    audience: ${JWT_AUDIENCE:transit-display-hub-admin}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:14}
  security:
    login-rate-limit:
      # Dev profile is generous so Playwright runs do not exhaust the
      # bucket between specs. Prod / kiosk profiles inherit the 5 / 5min
      # default from the filter itself.
      max-attempts: 100
      window-minutes: 5

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/transit}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USER:transit}
    password: ${DATABASE_PASSWORD:transit}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 10000
      leak-detection-threshold: 15000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        batch_versioned_data: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    # Two locations: the portable schema in db/migration plus Postgres-only
    # extensions (pg_trgm GIN indexes) in db/migration-postgres. The H2 dev
    # profile only points at the portable folder so it can boot without an
    # extension it doesn't ship.
    locations: classpath:db/migration,classpath:db/migration-postgres

app:
  data-loader:
    source: ${DATA_LOADER_SOURCE:}    # leave empty in prod by default
  jwt:
    secret: ${JWT_SECRET}
    expiration-hours: 8
    issuer: ${JWT_ISSUER:transit-display-hub}
    audience: ${JWT_AUDIENCE:transit-display-hub-admin}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:14}

---
# Kiosk profile — same posture as prod (PostgreSQL, validate-only DDL,
# explicit JWT_SECRET required) but tuned for single-host LAN
# deployments documented in docs/kiosk-raspberry-pi.md. Differences
# from prod:
#   - logs are tighter (no SQL trace);
#   - actuator surface is minimal (health only — no Prometheus scrape
#     since no Grafana on a kiosk host);
#   - Hikari pool sized for ≤4 connections (the kiosk is the only
#     consumer beyond the GTFS-RT scheduler).
spring:
  config:
    activate:
      on-profile: kiosk
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/transit}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USER:transit}
    password: ${DATABASE_PASSWORD:transit}
    hikari:
      maximum-pool-size: 4
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    locations: classpath:db/migration,classpath:db/migration-postgres

management:
  endpoints:
    web:
      exposure:
        include: health

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-hours: 8
    issuer: ${JWT_ISSUER:transit-display-hub}
    audience: ${JWT_AUDIENCE:transit-display-hub-admin}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:14}
