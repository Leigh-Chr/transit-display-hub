# Single-host stack for a kiosk deployment (Raspberry Pi 4+,
# x86 mini-PC, or any Linux box with Docker). Brings up:
#
#   - postgres   : persistent feed storage
#   - backend    : Spring Boot API on :8080
#   - frontend   : Nginx serving the Angular bundle on :8080 internally,
#                  mapped to host :80 (nginx-unprivileged can't bind <1024)
#
# Usage:
#   GTFS_FEED_URL=https://… docker compose -f docker-compose.kiosk.yml up -d --build
#
# A Chromium instance pointed at http://localhost/display/<stopId>
# turns the host into a kiosk. See docs/kiosk-raspberry-pi.md.

services:
  postgres:
    image: postgres:17-alpine
    container_name: transit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: transit
      POSTGRES_USER: transit
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - generate with: openssl rand -base64 24}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transit -d transit"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    # Default to the pre-built multi-arch GHCR image. Set TDH_VERSION
    # to pin a specific tag (e.g. v1.20.2) or leave it on latest. The
    # `build:` block stays declared so `docker compose build` still
    # compiles from the local checkout when BUILD_FROM_SOURCE=1 is set.
    image: ghcr.io/leigh-chr/transit-display-hub-backend:${TDH_VERSION:-latest}
    build:
      context: ../../backend
      dockerfile: Dockerfile
    pull_policy: ${TDH_PULL_POLICY:-always}
    container_name: transit-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: kiosk
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required - generate with: openssl rand -base64 48}"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transit
      SPRING_DATASOURCE_USERNAME: transit
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required - generate with: openssl rand -base64 24}"
      DATA_LOADER_GTFS_URL: ${GTFS_FEED_URL:-}
      APP_GTFS_VALIDATION_ENABLED: 'true'
    ports:
      - "8080:8080"

  frontend:
    image: ghcr.io/leigh-chr/transit-display-hub-frontend:${TDH_VERSION:-latest}
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    pull_policy: ${TDH_PULL_POLICY:-always}
    container_name: transit-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # External 80 → internal 8080 (nginx-unprivileged binds above 1024).
      - "80:8080"

volumes:
  postgres-data:
    driver: local
